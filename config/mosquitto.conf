# Mosquitto MQTT broker configuration – Tapo NVR Stack
#
# Frigate publishes detection events, camera health, and clip metadata here.
# Home Assistant / Node-RED subscribe to send push notifications.
#
# Security model:
#   • Anonymous connections are DISABLED.
#   • A hashed password file is generated at container startup from the
#     MQTT_USER / MQTT_PASSWORD environment variables (see docker-compose.yml).
#   • Host ports are bound to 127.0.0.1 only – not reachable from the LAN.
#     Docker-internal services (Frigate, HA on the same host) reach the
#     broker via the service name (mosquitto:1883) without any host port.

# ── Listeners ────────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Authentication ────────────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence (survive container restarts) ─────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type warning
log_timestamp true

# ── Retain messages so new subscribers get the last known state ───────────────
# (Frigate sets retained=true on status topics by default)
