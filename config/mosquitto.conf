# Mosquitto MQTT broker configuration – Tapo NVR Stack
#
# Frigate publishes detection events, camera health, and clip metadata here.
# Home Assistant / Node-RED subscribe to send push notifications.

# ── Listeners ────────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Anonymous access (LAN-only; add password_file for tighter security) ──────
allow_anonymous true

# ── Persistence (survive container restarts) ─────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type warning
log_timestamp true

# ── Retain messages so new subscribers get the last known state ───────────────
# (Frigate sets retained=true on status topics by default)
