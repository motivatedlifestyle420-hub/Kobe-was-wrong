# go2rtc configuration – Tapo NVR Stack (8 cameras)
#
# go2rtc reads environment variables from the env_file declared in
# docker-compose.yml, so ${CAM_USER} and ${CAM_PASS} are expanded at startup.
#
# Edit the camera IPs below (192.168.0.41–.48) to match your network.
# Tapo standard RTSP port is 554; adjust if your firmware differs.
#   Main stream (1080p/4K): /stream1
#   Sub  stream (360p):     /stream2

api:
  listen: ":1984"      # go2rtc web UI / REST API
  origin: "*"          # allow browser cross-origin WebRTC signalling

rtsp:
  listen: ":8554"      # RTSP re-stream consumed by Frigate

webrtc:
  listen: ":8555/tcp"  # WebRTC ICE TCP fallback; UDP 8555 also mapped in compose
  candidates:
    - stun:8555         # STUN for direct browser WebRTC connections

streams:

  cam1_main: rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.41:554/stream1
  cam1_sub:  rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.41:554/stream2

  cam2_main: rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.42:554/stream1
  cam2_sub:  rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.42:554/stream2

  cam3_main: rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.43:554/stream1
  cam3_sub:  rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.43:554/stream2

  cam4_main: rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.44:554/stream1
  cam4_sub:  rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.44:554/stream2

  cam5_main: rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.45:554/stream1
  cam5_sub:  rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.45:554/stream2

  cam6_main: rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.46:554/stream1
  cam6_sub:  rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.46:554/stream2

  cam7_main: rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.47:554/stream1
  cam7_sub:  rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.47:554/stream2

  cam8_main: rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.48:554/stream1
  cam8_sub:  rtsp://${CAM_USER}:${CAM_PASS}@192.168.0.48:554/stream2

log:
  level: warn          # debug | info | warn | error
