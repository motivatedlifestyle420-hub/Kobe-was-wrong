# Frigate NVR configuration – Tapo NVR Stack (8 cameras)
#
# Full reference: https://docs.frigate.video/configuration/
#
# Detection uses substreams (cam*_sub via go2rtc:8554) for low CPU load.
# Recording uses main streams (cam*_main via go2rtc:8554) for full quality.
# Resource estimate: ~15–25% CPU, ~2–3 GB RAM, ~150–250 GB/week (motion).

mqtt:
  host: mosquitto
  user: "${MQTT_USER}"
  password: "${MQTT_PASSWORD}"
  topic_prefix: frigate

# ── Detectors ────────────────────────────────────────────────────────────────
detectors:
  cpu1:
    type: cpu
  # ── Google Coral USB (uncomment + comment out cpu1) ──────────────────────
  # coral:
  #   type: edgetpu
  #   device: usb
  # ── NVIDIA GPU / Jetson (uncomment + comment out cpu1) ───────────────────
  # tensorrt:
  #   type: tensorrt
  #   device: 0

# ── Global recording defaults ─────────────────────────────────────────────────
record:
  enabled: true
  retain:
    days: 7
    mode: motion

# ── Global snapshot defaults ─────────────────────────────────────────────────
snapshots:
  enabled: true
  retain:
    default: 14

# ── Tracked objects ──────────────────────────────────────────────────────────
objects:
  track: [person, car, dog, cat]

# ── FFmpeg output preset for recordings ──────────────────────────────────────
ffmpeg:
  output_args:
    record: preset-record-generic-audio-copy

# ── Cameras ──────────────────────────────────────────────────────────────────
# Detect on the low-res substream; record in full quality from the main stream.
# Edit the labels to match your real camera locations once deployed.

cameras:

  cam1:
    ffmpeg:
      inputs:
        - path: rtsp://go2rtc:8554/cam1_sub
          input_args: preset-rtsp-restream
          roles: [detect]
        - path: rtsp://go2rtc:8554/cam1_main
          input_args: preset-rtsp-restream
          roles: [record]
    detect: { width: 640, height: 360, fps: 5 }

  cam2:
    ffmpeg:
      inputs:
        - path: rtsp://go2rtc:8554/cam2_sub
          input_args: preset-rtsp-restream
