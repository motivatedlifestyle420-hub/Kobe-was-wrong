name: Pytest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

          # Optional: install your project deps if you have them
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Check for test files
        run: |
          if [ -z "$(find . -name 'test_*.py' -o -name '*_test.py' | head -1)" ]; then
            echo "Error: No test files found matching patterns 'test_*.py' or '*_test.py'."
            exit 1
          fi

      - name: Run tests
        run: python -m pytest
