version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Tapo NVR Stack  –  go2rtc + Frigate + Mosquitto
#
# Streams:  Tapo cams (RTSP)  →  go2rtc (WebRTC/HLS)  →  Frigate (AI + NVR)
#           Frigate events  →  Mosquitto (MQTT)  →  notifications / HA
#
# Quick start:
#   1. Copy .env.example → .env and fill in camera credentials / IPs
#   2. Edit config/frigate.yml  (camera IPs, zones, recording preferences)
#   3. docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MQTT broker (Frigate publishes events here) ───────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    # Bind to localhost only – no external LAN/WAN exposure.
    # Services on the Docker network reach Mosquitto via the service name
    # (mosquitto:1883) without needing a host port at all.
    # Expose 127.0.0.1 only so tools running on the same host (e.g. HA OS,
    # MQTT Explorer) can connect, but nothing else on the LAN can.
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"  # WebSocket – Home Assistant / Node-RED (localhost only)
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    # Generate a hashed password file from env vars on every startup,
    # then hand off to the real mosquitto process.
    # Note: -c creates/replaces the file each time, so only one user
    # (MQTT_USER) is supported via this method. To add more users, omit -c
    # and mount a pre-generated passwd file instead.
    entrypoint: >
      sh -c "mosquitto_passwd -b -c /mosquitto/config/passwd
             \"$$MQTT_USER\" \"$$MQTT_PASSWORD\"
             && exec mosquitto -c /mosquitto/config/mosquitto.conf"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ── go2rtc – low-latency WebRTC / HLS relay ───────────────────────────────
  # Bridge networking (NOT host): all services can resolve each other by name.
  # Frigate reaches streams as rtsp://go2rtc:8554/<name> with no extra_hosts
  # hacks.  Works on Linux, macOS, and Windows Docker Desktop identically.
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: go2rtc
    restart: unless-stopped
    ports:
      - "1984:1984"      # go2rtc web UI + REST API
      - "8554:8554"      # RTSP re-stream (consumed by Frigate; also accessible from host)
      - "8555:8555/tcp"  # WebRTC ICE TCP fallback
      - "8555:8555/udp"  # WebRTC ICE UDP (primary – required for direct browser WebRTC)
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/go2rtc.yaml:/config/go2rtc.yaml:ro

  # ── Frigate – AI NVR (detection + recording + event timeline) ────────────
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    privileged: true            # needed for hardware acceleration access
    shm_size: "256mb"           # shared memory for frame buffers
    depends_on:
      - mosquitto
      - go2rtc
    ports:
      - "5000:5000"             # Frigate web UI
      - "8971:8971"             # Frigate web UI (TLS, optional)
      - "1935:1935"             # RTMP (optional re-stream output)
    environment:
      - TZ=${TZ:-America/New_York}
      - FRIGATE_RTSP_PASSWORD=${CAMERA_PASSWORD}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    volumes:
      - ./config/frigate.yml:/config/config.yml:ro
      - frigate_media:/media/frigate
      - /etc/localtime:/etc/localtime:ro
      # Uncomment ONE of the accelerator options below:
      # ── Google Coral USB ──
      # - /dev/bus/usb:/dev/bus/usb
      # ── Raspberry Pi GPU ──
      # - /dev/dma_heap:/dev/dma_heap
      # - /dev/video10:/dev/video10
      # - /dev/video11:/dev/video11
      # - /dev/video12:/dev/video12
    devices:
      # ── Coral USB (uncomment if attached) ──
      # - /dev/bus/usb:/dev/bus/usb
      # ── NVIDIA GPU (uncomment + add `runtime: nvidia` below) ──
      # - /dev/nvidia0:/dev/nvidia0
      []
    # runtime: nvidia            # uncomment for NVIDIA GPU

  # ── Dashboard (static command-center landing page) ────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: nvr-dashboard
    restart: unless-stopped
    depends_on:
      - frigate
      - go2rtc
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro

volumes:
  mosquitto_data:
  mosquitto_log:
  frigate_media:
